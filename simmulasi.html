<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Shooter Game</title>
    <!-- Tailwind CSS untuk tampilan UI yang modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: none; /* Mencegah zoom/scroll default di perangkat mobile */
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body class="bg-slate-950 text-white flex flex-col items-center justify-center min-h-screen overflow-hidden font-sans">

    <!-- Container Game -->
    <div class="relative w-full max-w-md h-[100vh] md:h-[90vh] bg-slate-900 md:rounded-2xl md:shadow-2xl overflow-hidden flex flex-col border border-slate-800">
        
        <!-- Header Informasi (UI Atas) -->
        <div class="absolute top-0 left-0 right-0 z-10 flex justify-between items-center px-6 py-4 bg-gradient-to-b from-slate-950/80 to-transparent pointer-events-none">
            <div class="flex flex-col">
                <span class="text-[10px] uppercase tracking-wider text-slate-400 font-medium">Score</span>
                <span id="ui-score" class="text-2xl font-black text-emerald-400">0</span>
            </div>
            <div class="flex flex-col items-end">
                <span class="text-[10px] uppercase tracking-wider text-slate-400 font-medium">Shield Integrity</span>
                <span id="ui-hp" class="text-2xl font-black text-cyan-400">100%</span>
            </div>
        </div>

        <!-- Canvas Utama Game -->
        <canvas id="gameCanvas" class="w-full h-full block bg-slate-950"></canvas>

        <!-- Layar Mulai / Game Over -->
        <div id="screen-overlay" class="absolute inset-0 z-20 flex flex-col items-center justify-center bg-slate-950/90 px-8 transition-all duration-300">
            <h1 id="overlay-title" class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 tracking-wider uppercase text-center mb-2">
                Space Guardian
            </h1>
            <p id="overlay-desc" class="text-xs text-slate-400 text-center max-w-xs mb-8">
                Tahan layar untuk menggerakkan pesawat dan menembak otomatis. Lindungi batas bawah dari serangan meteor!
                EXPERIMENT BARA!
            </p>
            <button id="btn-action" class="w-full max-w-xs py-4 bg-gradient-to-r from-emerald-500 to-cyan-500 hover:from-emerald-400 hover:to-cyan-400 text-slate-950 font-extrabold uppercase tracking-widest rounded-xl shadow-lg shadow-emerald-500/20 transform active:scale-95 transition-all">
                Mulai Game
            </button>
        </div>

        <!-- Tombol Pause (Pojok Kiri Bawah) -->
        <button id="btn-pause" class="hidden absolute bottom-6 left-6 z-10 w-11 h-11 bg-slate-900/80 hover:bg-slate-800/80 border border-slate-700/50 rounded-xl items-center justify-center backdrop-blur-sm active:scale-95 transition-all">
            <svg class="w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </button>

    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Pengaturan Skala Dimensi Kanvas Internal
        const GAME_WIDTH = 360;
        const GAME_HEIGHT = 640;

        // Deklarasi Elemen UI
        const uiScore = document.getElementById('ui-score');
        const uiHp = document.getElementById('ui-hp');
        const screenOverlay = document.getElementById('screen-overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');
        const btnAction = document.getElementById('btn-action');
        const btnPause = document.getElementById('btn-pause');

        // Status Game
        let isPlaying = false;
        let isPaused = false;
        let score = 0;
        let hp = 100;

        // Entitas Game
        let playerX = GAME_WIDTH / 2;
        let playerY = GAME_HEIGHT - 80;
        const playerWidth = 32;
        const playerHeight = 28;

        let bullets = [];
        let enemies = [];
        let particles = [];
        let explosions = []; // Array penampung efek cincin ledakan hancur

        // Kontrol Input Menembak
        let isTouching = false;
        let shootTimer = 0;
        const shootCooldown = 10; // Jeda tembakan beruntun (frame)

        // Kontrol Spawn Musuh
        let enemySpawnTimer = 0;

        // Set ukuran fisik kanvas sesuai container layar
        function resizeCanvas() {
            canvas.width = GAME_WIDTH;
            canvas.height = GAME_HEIGHT;
        }
        resizeCanvas();

        // --- SISTEM INPUT (TOUCH & MOUSE) ---
        function handleInputStart(clientX, clientY) {
            if (!isPlaying || isPaused) return;
            isTouching = true;
            updatePlayerPosition(clientX, clientY);
        }

        function handleInputMove(clientX, clientY) {
            if (!isPlaying || isPaused || !isTouching) return;
            updatePlayerPosition(clientX, clientY);
        }

        function handleInputEnd() {
            isTouching = false;
        }

        function updatePlayerPosition(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = GAME_WIDTH / rect.width;
            const scaleY = GAME_HEIGHT / rect.height;
            
            // Konversi posisi tap/klik ke posisi koordinat internal game
            let targetX = (clientX - rect.left) * scaleX;
            let targetY = (clientY - rect.top) * scaleY;

            // Batasi posisi pemain agar tidak keluar area kanvas
            playerX = Math.max(playerWidth / 2, Math.min(GAME_WIDTH - playerWidth / 2, targetX));
            playerY = Math.max(GAME_HEIGHT / 2, Math.min(GAME_HEIGHT - 30, targetY)); // Hanya boleh bergerak di area bawah setengah layar
        }

        // Event Listeners untuk Handphone (Touch)
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInputStart(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            handleInputMove(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        canvas.addEventListener('touchend', handleInputEnd);

        // Event Listeners untuk Komputer (Mouse)
        canvas.addEventListener('mousedown', (e) => {
            handleInputStart(e.clientX, e.clientY);
        });

        canvas.addEventListener('mousemove', (e) => {
            handleInputMove(e.clientX, e.clientY);
        });

        window.addEventListener('mouseup', handleInputEnd);

        // --- PARTIKEL CIPRATAN BIASA (HITS) ---
        function spawnParticles(x, y, color) {
            for (let i = 0; i < 6; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    radius: Math.random() * 2 + 0.8,
                    alpha: 1,
                    decay: Math.random() * 0.05 + 0.03,
                    color: color
                });
            }
        }

        // --- EFEK LEDAKAN UTAMA (KILL MUSUH) ---
        function spawnExplosion(x, y, color) {
            // 1. Gelombang cincin ekspansi cahaya (Shockwave)
            explosions.push({
                x: x,
                y: y,
                radius: 5,
                maxRadius: 35,
                alpha: 1,
                decay: 0.05,
                color: color
            });

            // 2. Semburan banyak partikel radial dengan kecepatan tinggi
            for (let i = 0; i < 20; i++) {
                const angle = Math.random() * Math.PI * 2; // Menyebar 360 derajat melingkar
                const speed = Math.random() * 6 + 4;       // Kecepatan dorongan partikel
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    radius: Math.random() * 3 + 1,
                    alpha: 1, 
                    decay: Math.random() * 0.04 + 0.02, // Memudar bertahap secara acak
                    color: color
                });
            }
        }

        // --- LOOP UTAMA JALANNYA GAME ---
        function update() {
            if (!isPlaying || isPaused) {
                requestAnimationFrame(update);
                return;
            }

            // --- 1. LOGIKA TEMBAKAN AUTO SHOOT ---
            if (isTouching) {
                // Sentuhan pertama: Peluru langsung dikeluarkan instan tanpa jeda/delay
                if (shootTimer === 0) {
                    bullets.push({ x: playerX, y: playerY - 14, radius: 2.5, speed: 11 });
                }
                shootTimer++;
                // Semburan beruntun berikutnya mengikuti cooldown normal (10 frame)
                if (shootTimer >= shootCooldown) {
                    shootTimer = 0; 
                }
            } else {
                // Saat sentuhan dilepaskan, timer di-reset agar penekanan berikutnya kembali responsif instan
                shootTimer = 0; 
            }

            // --- 2. PEMUNCULAN TARGET METEOR/MUSUH ---
            enemySpawnTimer++;
            let spawnRate = Math.max(15, 45 - Math.floor(score / 5));
            if (enemySpawnTimer >= spawnRate) {
                enemySpawnTimer = 0;
                const size = Math.random() * 16 + 16;
                const isBig = size > 25;
                
                // Pembatasan Multiplier Kecepatan Musuh (Speed Cap)
                const baseSpeed = Math.random() * 1.2 + 1.8;
                const speedMultiplier = Math.min(2.5, 1 + (score * 0.012)); 

                enemies.push({
                    // Area acak X disesuaikan agar badan musuh tidak muncul terpotong di tepi kanvas
                    x: Math.random() * (GAME_WIDTH - size) + size / 2,
                    y: -size,
                    width: size, 
                    height: size,
                    speed: baseSpeed * speedMultiplier,
                    hp: isBig ? 3 : 1,
                    color: isBig ? '#f59e0b' : '#22d3ee'
                });
            }

            // --- 3. PEMBARUAN POSISI & PEMBERSIHAN PELURU ---
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                // Bersihkan langsung jika peluru melewati batas atas layar secara bersih
                if (bullets[i].y < -10) {
                    bullets.splice(i, 1);
                }
            }

            // --- 4. PEMBARUAN POSISI MUSUH & DETEKSI TABRAKAN ---
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.y += e.speed;

                // Musuh lolos ke batas bawah game (Mengurangi Shield HP)
                if (e.y > GAME_HEIGHT + e.height) {
                    hp -= 20;
                    if (hp < 0) hp = 0;
                    uiHp.innerText = hp + "%";
                    if (hp <= 40) uiHp.className = "text-2xl font-black text-rose-500 animate-pulse";
                    enemies.splice(i, 1);
                    if (hp <= 0) gameOver();
                    continue;
                }

                // Deteksi Tabrakan Peluru -> Musuh
                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    
                    if (b.x > e.x - e.width/2 - b.radius && b.x < e.x + e.width/2 + b.radius &&
                        b.y > e.y - e.height/2 - b.radius && b.y < e.y + e.height/2 + b.radius) {
                        
                        bullets.splice(j, 1); // Hapus peluru
                        e.hp--;

                        if (e.hp <= 0) {
                            // Musuh MATI: Aktifkan Ledakan Cincin & Partikel Radial Besar!
                            spawnExplosion(e.x, e.y, e.color);
                            
                            score += e.width > 25 ? 3 : 1;
                            uiScore.innerText = score;
                            enemies.splice(i, 1);
                            break;
                        } else {
                            // Musuh Terkena Hit biasa: Semburkan partikel serpihan kecil putih
                            spawnParticles(b.x, b.y, '#ffffff');
                        }
                    }
                }
            }

            // --- 5. ANIMASI EFEK LEDAKAN CINCIN (SHOCKWAVE) ---
            for (let i = explosions.length - 1; i >= 0; i--) {
                let exp = explosions[i];
                exp.radius += (exp.maxRadius - exp.radius) * 0.15; // Mengembang mulus
                exp.alpha -= exp.decay; // Pudar perlahan
                if (exp.alpha <= 0) {
                    explosions.splice(i, 1);
                }
            }

            // --- 6. ANIMASI PARTIKEL (DECAY VELOCITY) ---
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.vx *= 0.96; // Gesekan udara agar gerak melambat halus
                p.vy *= 0.96;
                p.x += p.vx; 
                p.y += p.vy; 
                p.alpha -= p.decay;
                if (p.alpha <= 0) particles.splice(i, 1);
            }

            // --- GAMBAR ULANG DI KANVAS (RENDER PROCESS) ---
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // Latar Belakang Luar Angkasa
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            
            // Garis Kisi Transparan (Grid FX)
            ctx.strokeStyle = 'rgba(16, 185, 129, 0.04)';
            ctx.lineWidth = 1;
            for(let x=0; x<GAME_WIDTH; x+=40) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GAME_HEIGHT); ctx.stroke();
            }
            for(let y=0; y<GAME_HEIGHT; y+=40) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(GAME_WIDTH, y); ctx.stroke();
            }

            // Render Peluru (Efek Laser Bercahaya)
            bullets.forEach(b => {
                ctx.save();
                ctx.strokeStyle = 'rgba(34, 211, 238, 0.4)';
                ctx.lineWidth = b.radius * 1.5;
                ctx.beginPath();
                ctx.moveTo(b.x, b.y);
                ctx.lineTo(b.x, b.y + 12);
                ctx.stroke();

                ctx.fillStyle = '#22d3ee';
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            // Render Pesawat Pemburu (Player)
            ctx.save();
            ctx.translate(playerX, playerY);
            ctx.fillStyle = '#10b981';
            ctx.beginPath();
            ctx.moveTo(0, -14);
            ctx.lineTo(playerWidth / 2, playerHeight / 2);
            ctx.lineTo(-playerWidth / 2, playerHeight / 2);
            ctx.closePath();
            ctx.fill();
            
            // Inti Reaktor Hijau Terang di Tengah Pesawat
            ctx.fillStyle = '#a7f3d0';
            ctx.beginPath(); 
            ctx.arc(0, 2, 4, 0, Math.PI * 2); 
            ctx.fill();
            ctx.restore();

            // Render Target (Musuh/Meteor Kotak Modern)
            enemies.forEach(e => {
                ctx.save();
                ctx.translate(e.x, e.y);
                ctx.fillStyle = e.color;
                ctx.fillRect(-e.width/2, -e.height/2, e.width, e.height);
                
                // Stroke pembatas neon tipis
                ctx.strokeStyle = '#ffffff';
                ctx.globalAlpha = 0.3;
                ctx.strokeRect(-e.width/2, -e.height/2, e.width, e.height);
                
                // Mata Merah Khas Alien Mini
                ctx.globalAlpha = 1.0;
                ctx.fillStyle = '#f43f5e';
                ctx.fillRect(-e.width/5 - 1.5, -e.height/5, 3, 3);
                ctx.fillRect(e.width/5 - 1.5, -e.height/5, 3, 3);
                ctx.restore();
            });

            // Render Efek Ledakan Cincin (Shockwave)
            explosions.forEach(exp => {
                ctx.save();
                ctx.globalAlpha = exp.alpha;
                ctx.strokeStyle = exp.color;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(exp.x, exp.y, exp.radius, 0, Math.PI * 2);
                ctx.stroke();
                
                // Pendar cahaya halus menyebar di dalam cincin
                ctx.fillStyle = exp.color;
                ctx.globalAlpha = exp.alpha * 0.2;
                ctx.beginPath();
                ctx.arc(exp.x, exp.y, exp.radius * 0.6, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            // Render Partikel Percikan (Cipratan Biasa & Serpihan Ledakan)
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            requestAnimationFrame(update);
        }

        // --- MANAJEMEN RESET & STATUS GAME ---
        function resetGame() {
            score = 0;
            hp = 100;
            playerX = GAME_WIDTH / 2;
            playerY = GAME_HEIGHT - 80;
            bullets = [];
            enemies = [];
            particles = [];
            explosions = []; // Kosongkan seluruh sisa ledakan sebelumnya
            enemySpawnTimer = 0;
            shootTimer = 0;
            isTouching = false;

            uiScore.innerText = score;
            uiHp.innerText = "100%";
            uiHp.className = "text-2xl font-black text-cyan-400";
        }

        function startGame() {
            resetGame();
            isPlaying = true;
            isPaused = false;
            screenOverlay.classList.add('opacity-0', 'pointer-events-none');
            btnPause.classList.remove('hidden');
            btnPause.classList.add('flex');
        }

        function gameOver() {
            isPlaying = false;
            screenOverlay.classList.remove('opacity-0', 'pointer-events-none');
            overlayTitle.innerText = "GAME OVER";
            overlayTitle.className = "text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-rose-500 to-orange-500 tracking-wider uppercase text-center mb-2";
            overlayDesc.innerHTML = `Pertahanan hancur!<br>Skor Akhirmu: <strong class="text-white text-lg">${score}</strong>`;
            btnAction.innerText = "Main Lagi";
            btnPause.classList.add('hidden');
        }

        function togglePause() {
            if (!isPlaying) return;
            isPaused = !isPaused;
            if (isPaused) {
                btnPause.innerHTML = `
                    <svg class="w-5 h-5 text-emerald-400" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                `;
                screenOverlay.classList.remove('opacity-0', 'pointer-events-none');
                overlayTitle.innerText = "GAME PAUSED";
                overlayTitle.className = "text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-amber-500 tracking-wider uppercase text-center mb-2";
                overlayDesc.innerText = "Game sedang dihentikan sementara.";
                btnAction.innerText = "Lanjutkan Game";
            } else {
                btnPause.innerHTML = `
                    <svg class="w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                `;
                screenOverlay.classList.add('opacity-0', 'pointer-events-none');
            }
        }

        // Tombol aksi di layar utama overlay
        btnAction.addEventListener('click', () => {
            if (isPaused) {
                togglePause(); // Jika dipause, klik tombol ini untuk melanjutkan
            } else {
                startGame(); // Jika baru pertama kali / mati, klik untuk mulai ulang
            }
        });

        btnPause.addEventListener('click', (e) => {
            e.stopPropagation(); // Mencegah bentrok input touch dengan kanvas saat mengeklik tombol pause
            togglePause();
        });

        // Jalankan loop game pertama kali (standby menunggu start)
        requestAnimationFrame(update);
    </script>
</body>
</html>
